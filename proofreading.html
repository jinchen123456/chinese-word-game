<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>截稿倒數60秒</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ══════════ 開始畫面 ══════════ -->
  <div id="screen-start" class="screen active">
    <div class="start-wrap">

      <!-- 背景飄動裝飾 -->
      <div class="start-deco" aria-hidden="true">
        <span class="deco-item di-1">📄</span>
        <span class="deco-item di-2">✏️</span>
        <span class="deco-item di-3">☕</span>
        <span class="deco-item di-4">⏰</span>
        <span class="deco-item di-5">📰</span>
        <span class="deco-item di-6">🖊️</span>
        <span class="deco-item di-7">📄</span>
        <span class="deco-item di-8">📎</span>
        <span class="deco-item di-9">✂️</span>
        <span class="deco-item di-10">☕</span>
      </div>

      <div class="logo-box">稿</div>
      <h1 class="game-title">截稿倒數60秒</h1>
      <p class="game-sub">主編之眼，校稿出擊！</p>

      <div class="rule-row">
        <div class="rule-chip"><span class="icon">⏱</span>60 秒限時</div>
        <div class="rule-chip"><span class="icon">❤️</span>3 顆心</div>
        <div class="rule-chip"><span class="icon">🔍</span>找錯字</div>
      </div>

      <button id="start-btn" class="btn-primary">開始校對</button>
      <button id="lb-open-btn" class="btn-ghost">查看排行榜 🏆</button>
      <a href="index.html" style="position:relative;z-index:1;font-size:13px;color:var(--muted);text-decoration:none;letter-spacing:1px;">‹ 返回天下充電樁</a>
    </div>
  </div>

  <!-- ══════════ 遊戲畫面 ══════════ -->
  <div id="screen-game" class="screen">

    <div class="top-bar">
      <div class="hearts" id="hearts-display">❤️❤️❤️</div>

      <div class="timer-block">
        <div class="bar-label">剩餘時間</div>
        <div class="timer-num" id="global-timer">60</div>
      </div>

      <div class="score-block">
        <div class="score-label">分數</div>
        <div class="score-num" id="score-display">0</div>
        <div class="rank-display" id="rank-display">實習校稿員</div>
      </div>
    </div>

    <div class="bar-wrap">
      <div class="per-q-bar" id="per-q-bar"></div>
    </div>

    <div class="question-area">
      <p class="question-text" id="question-text">請找出文句中的錯字：</p>
    </div>

    <div class="char-tiles-area" id="char-tiles-area" style="display:none">
      <p class="ec-hint" id="ec-hint"></p>
      <div class="char-tiles" id="char-tiles"></div>
      <button id="char-confirm-btn" class="handwrite-submit-btn">確認</button>
    </div>

    <div class="explanation" id="explanation" style="display:none">
      <div class="answer-label" id="answer-label">✅ 正確答案：<span id="answer-display"></span></div>
      <div class="explanation-body" id="explanation-text"></div>
    </div>

  </div>

  <!-- ══════════ 結算畫面 ══════════ -->
  <div id="screen-end" class="screen">
    <div class="end-wrap">
      <div class="end-icon" id="end-icon">⏰</div>
      <h2 class="end-title" id="end-title">截稿時間到！</h2>
      <div class="final-score" id="final-score">0</div>
      <p class="unit-label">分</p>

      <div class="end-rank-badge" id="end-rank">實習校稿員</div>

      <div class="rank-ladder" id="rank-ladder"></div>

      <div class="stats-row">
        <div class="stat">
          <span class="stat-val" id="stat-correct">0</span>
          <span class="stat-label">答對</span>
        </div>
        <div class="stat">
          <span class="stat-val" id="stat-total">0</span>
          <span class="stat-label">作答</span>
        </div>
        <div class="stat">
          <span class="stat-val" id="stat-acc">0%</span>
          <span class="stat-label">正確率</span>
        </div>
      </div>

      <div class="new-record" id="new-record" style="display:none">🎉 新紀錄！</div>

      <button id="replay-btn" class="btn-primary">再校一輪</button>
      <button id="end-lb-btn" class="btn-ghost">查看排行榜 🏆</button>
      <button id="home-btn" class="btn-ghost">返回首頁</button>
    </div>
  </div>

  <!-- ══════════ 排行榜畫面 ══════════ -->
  <div id="screen-lb" class="screen">
    <div class="lb-header">
      <button id="lb-back-btn" class="lb-back-btn">‹ 返回</button>
      <h2 class="lb-title">排行榜</h2>
      <button id="lb-clear-btn" class="lb-clear-btn">清除</button>
    </div>
    <div class="lb-list" id="lb-list"></div>
    <p class="lb-empty" id="lb-empty" style="display:none">還沒有紀錄，快去挑戰吧！</p>
  </div>

  <script src="questions.js"></script>
  <script src="sounds.js"></script>
  <script src="game.js"></script>
</body>
</html>

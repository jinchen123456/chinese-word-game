<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天下打個Game</title>
  <link rel="stylesheet" href="lobby.css">
</head>
<body>

<div class="lobby-wrap">

  <!-- ── 品牌 Header ── -->
  <div class="lobby-header">
    <div class="brand-row">
      <div class="brand-icon">🎮</div>
      <div class="brand-text">
        <div class="brand-name">天下打個<span class="brand-game">Game</span></div>
        <div class="brand-sub">打一局，各種力 +1</div>
      </div>
    </div>
  </div>

  <!-- ── 今日能量板 ── -->
  <div class="energy-board">
    <div class="energy-title">今日充了幾格？</div>
    <div class="energy-stats" id="energy-stats">
      <div class="estat" data-key="eye">
        <span class="estat-icon">👁</span>
        <span class="estat-label">眼力</span>
        <span class="estat-plus" id="stat-eye">+0</span>
      </div>
      <div class="estat" data-key="word">
        <span class="estat-icon">✍️</span>
        <span class="estat-label">文字力</span>
        <span class="estat-plus" id="stat-word">+0</span>
      </div>
      <div class="estat" data-key="info">
        <span class="estat-icon">📡</span>
        <span class="estat-label">資訊力</span>
        <span class="estat-plus" id="stat-info">+0</span>
      </div>
      <div class="estat" data-key="brain">
        <span class="estat-icon">🧠</span>
        <span class="estat-label">腦力</span>
        <span class="estat-plus" id="stat-brain">+0</span>
      </div>
      <div class="estat" data-key="power">
        <span class="estat-icon">⚡</span>
        <span class="estat-label">電力</span>
        <span class="estat-plus" id="stat-power">+0</span>
      </div>
    </div>
  </div>

  <!-- ── 選關卡 ── -->
  <div class="section-label">選關卡</div>

  <div class="game-cards">

    <!-- 截稿倒數60秒 -->
    <a class="game-card card-red" href="proofreading.html">
      <div class="card-inner">
        <div class="card-left">
          <div class="card-emoji">📰</div>
          <div class="card-info">
            <div class="card-title">截稿倒數60秒</div>
            <div class="card-desc">60秒揪出錯別字，你的眼睛是最後防線</div>
            <div class="stat-chips">
              <span class="chip chip-red">👁 眼力 +1</span>
              <span class="chip chip-red">✍️ 文字力 +1</span>
              <span class="chip chip-yellow">⚡ 電力 +1</span>
            </div>
          </div>
        </div>
        <div class="card-arrow">›</div>
      </div>
      <div class="card-meta-row">
        <span class="meta-chip">⏱ 60秒</span>
        <span class="meta-chip">❤️ 3顆心</span>
        <span class="meta-chip">🥇 5階職位</span>
      </div>
    </a>

    <!-- 時事解毒室 -->
    <div class="game-card card-teal card-locked">
      <div class="card-inner">
        <div class="card-left">
          <div class="card-emoji">🧪</div>
          <div class="card-info">
            <div class="card-title">時事解毒室</div>
            <div class="card-desc">釐清新聞真相，練出不被帶風向的判斷力</div>
            <div class="stat-chips">
              <span class="chip chip-teal">📡 資訊力 +1</span>
              <span class="chip chip-teal">🧠 腦力 +1</span>
              <span class="chip chip-yellow">⚡ 電力 +1</span>
            </div>
          </div>
        </div>
        <div class="card-coming">即將<br>推出</div>
      </div>
      <div class="card-meta-row">
        <span class="meta-chip">📅 每週更新</span>
        <span class="meta-chip">🔍 新聞解析</span>
      </div>
    </div>

  </div>

  <!-- ── 底部說明 ── -->
  <div class="lobby-footer">
    <p>每打一局，<strong>活力 +1</strong>。今天也好好充電了。</p>
  </div>

</div>

<script>
const STREAK_KEY  = 'cw_charger_streak';
const PLAYED_KEY  = 'cw_played_today';

function getToday() {
  return new Date().toLocaleDateString('zh-TW');
}

function updateStats() {
  const today   = getToday();
  let played = {};
  try { played = JSON.parse(localStorage.getItem(PLAYED_KEY)) || {}; } catch {}

  const playedToday = played[today] || {};

  // 截稿倒數 → 眼力、文字力、電力
  const didProof = !!playedToday.proofreading;
  setPlus('stat-eye',   didProof ? '+1' : '+0', didProof);
  setPlus('stat-word',  didProof ? '+1' : '+0', didProof);
  setPlus('stat-power', didProof ? '+1' : '+0', didProof);

  // 時事解毒室 → 資訊力、腦力 (未推出，常態 +0)
  setPlus('stat-info',  '+0', false);
  setPlus('stat-brain', '+0', false);
}

function setPlus(id, text, active) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.classList.toggle('active', active);
  el.closest('.estat').classList.toggle('estat-active', active);
}

updateStats();
</script>

</body>
</html>

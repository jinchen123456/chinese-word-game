<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大腦健身房</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ══════════ 開始畫面 ══════════ -->
  <div id="screen-start" class="screen active">
    <div class="start-wrap">
      <div class="logo-box">腦</div>
      <h1 class="game-title">大腦健身房</h1>
      <p class="game-sub">字音字形・活化大腦</p>

      <p class="diff-label">選擇難度</p>
      <div class="diff-row">
        <button class="diff-btn active" data-diff="1">易</button>
        <button class="diff-btn"        data-diff="2">中</button>
        <button class="diff-btn"        data-diff="3">難</button>
      </div>

      <div class="rule-row">
        <div class="rule-chip"><span class="icon">⏱</span>60 秒限時</div>
        <div class="rule-chip"><span class="icon">❤️</span><span id="rule-hearts">3 顆心</span></div>
        <div class="rule-chip"><span class="icon">⏱</span><span id="rule-per-q">每題 10 秒</span></div>
      </div>

      <button id="start-btn" class="btn-primary">開始挑戰</button>
      <button id="lb-open-btn" class="btn-ghost">查看排行榜 🏆</button>
    </div>
  </div>

  <!-- ══════════ 遊戲畫面 ══════════ -->
  <div id="screen-game" class="screen">

    <div class="top-bar">
      <div class="hearts" id="hearts-display">❤️❤️❤️</div>

      <div class="timer-block">
        <div class="bar-label">剩餘時間</div>
        <div class="timer-num" id="global-timer">60</div>
      </div>

      <div class="score-block">
        <div class="score-label">分數</div>
        <div class="score-num" id="score-display">0</div>
      </div>
    </div>

    <div class="bar-wrap">
      <div class="per-q-bar" id="per-q-bar"></div>
    </div>

    <div class="question-area">
      <span class="type-badge" id="question-type-badge">字音</span>
      <p class="question-text" id="question-text"></p>
    </div>

    <div class="options-grid" id="options-grid"></div>

    <div class="explanation" id="explanation" style="display:none">
      <div class="answer-label">✅ 正確答案：<span id="answer-display"></span></div>
      <div class="explanation-body" id="explanation-text"></div>
    </div>

  </div>

  <!-- ══════════ 結算畫面 ══════════ -->
  <div id="screen-end" class="screen">
    <div class="end-wrap">
      <div class="end-icon"  id="end-icon">⏰</div>
      <h2 class="end-title"  id="end-title">時間到！</h2>
      <div class="final-score" id="final-score">0</div>
      <p class="unit-label">分</p>

      <div class="stats-row">
        <div class="stat">
          <span class="stat-val"   id="stat-correct">0</span>
          <span class="stat-label">答對</span>
        </div>
        <div class="stat">
          <span class="stat-val"   id="stat-total">0</span>
          <span class="stat-label">作答</span>
        </div>
        <div class="stat">
          <span class="stat-val"   id="stat-acc">0%</span>
          <span class="stat-label">正確率</span>
        </div>
      </div>

      <div class="new-record" id="new-record" style="display:none">🎉 新紀錄！</div>

      <button id="replay-btn"      class="btn-primary">再玩一次</button>
      <button id="end-lb-btn"      class="btn-ghost">查看排行榜 🏆</button>
      <button id="change-diff-btn" class="btn-ghost">更換難度</button>
    </div>
  </div>

  <!-- ══════════ 排行榜畫面 ══════════ -->
  <div id="screen-lb" class="screen">
    <div class="lb-header">
      <button id="lb-back-btn" class="lb-back-btn">‹ 返回</button>
      <h2 class="lb-title">排行榜</h2>
      <button id="lb-clear-btn" class="lb-clear-btn">清除</button>
    </div>
    <div class="lb-list" id="lb-list"></div>
    <p class="lb-empty" id="lb-empty" style="display:none">還沒有紀錄，快去挑戰吧！</p>
  </div>

  <script src="questions.js"></script>
  <script src="sounds.js"></script>
  <script src="game.js"></script>
</body>
</html>
